name: Deploy to GCP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./venv/*" -not -path "./.git/*" \
            | xargs python -m py_compile
          echo "Syntax OK"

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/yassir-bot && git pull origin master
            source ~/yassir-bot/venv/bin/activate && pip install -r requirements.txt -q
            sudo systemctl restart yassir-bot
            echo "Deploy done"
